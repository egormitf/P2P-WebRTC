
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>P2P WebRTC Messenger</title>
    <style>
        body {
            background-color: #020617;
            color: #f1f5f9;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            user-select: none;
            -webkit-user-select: none;
        }
        .chat-container {
            width: 100%;
            max-width: 450px;
            height: 100%;
            background-color: #0f172a;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        @media (min-width: 768px) {
            .chat-container {
                height: 90vh;
                max-height: 850px;
                border-radius: 1rem;
                border: 1px solid #1e293b;
                box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            }
        }
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
        @keyframes messageSlide {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-message {
            animation: messageSlide 0.2s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }
        .header-btn {
            padding: 8px;
            border-radius: 9999px;
            color: #94a3b8;
            cursor: pointer;
            background: transparent;
            border: none;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s, color 0.2s;
        }
        .header-btn:hover {
            background-color: #1e293b;
            color: #ffffff;
        }
        .header-btn svg {
            width: 24px;
            height: 24px;
        }
        .step-panel {
            display: flex;
            flex-direction: column;
            gap: 16px;
            padding: 24px;
            height: 100%;
            justify-content: center;
            box-sizing: border-box;
        }
        textarea {
            width: 100%;
            height: 100px;
            background-color: #020617;
            border: 1px solid #334155;
            border-radius: 12px;
            color: #ffffff;
            padding: 12px;
            font-size: 12px;
            outline: none;
            resize: none;
            box-sizing: border-box;
        }
        .p2p-btn {
            background-color: #2563eb;
            color: #ffffff;
            border: none;
            padding: 12px;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
            text-align: center;
        }
        .p2p-btn:hover {
            background-color: #1d4ed8;
        }
        .p2p-btn-secondary {
            background-color: #1e293b;
            color: #cbd5e1;
            border: 1px solid #334155;
        }
        .p2p-btn-secondary:hover {
            background-color: #334155;
        }
    </style>
</head>
<body>

    <div class="chat-container">
        
        <!-- ЭКРАН 1: НАСТРОЙКА P2P СВЯЗИ -->
        <div id="setupScreen" class="step-panel">
            <h2 style="font-size: 1.5rem; font-weight: 700; margin: 0; text-align: center;">P2P Мессенджер</h2>
            <p style="font-size: 13px; color: #94a3b8; text-align: center; margin: 0 0 16px 0; line-height: 1.5;">
                Прямое шифрованное соединение между двумя устройствами в обход любых серверов и блокировок интернета.
            </p>

            <div id="initialChoice" style="display: flex; flex-direction: column; gap: 12px; width: 100%;">
                <button id="btnInitHost" class="p2p-btn">Создать комнату (Я Хост)</button>
                <button id="btnInitClient" class="p2p-btn p2p-btn-secondary">Присоединиться к комнате</button>
            </div>

            <!-- Шаги для Хоста (Создателя) -->
            <div id="hostSteps" style="display: none; flex-direction: column; gap: 12px;">
                <label style="font-size: 12px; font-weight: 600; color: #94a3b8; text-transform: uppercase;">Шаг 1: Скопируйте ваш код и отправьте другу</label>
                <textarea id="hostOfferCode" readonly placeholder="Генерация кода..."></textarea>
                <button id="btnCopyOffer" class="p2p-btn p2p-btn-secondary" style="padding: 8px;">Скопировать код подключения</button>

                <label style="font-size: 12px; font-weight: 600; color: #94a3b8; text-transform: uppercase; margin-top: 8px;">Шаг 2: Вставьте ответный код друга</label>
                <textarea id="hostAnswerInput" placeholder="Вставьте сюда код, который пришлет друг..."></textarea>
                <button id="btnConnectHost" class="p2p-btn">Подключиться напрямую</button>
            </div>

            <!-- Шаги для Клиента (Присоединяющегося) -->
            <div id="clientSteps" style="display: none; flex-direction: column; gap: 12px;">
                <label style="font-size: 12px; font-weight: 600; color: #94a3b8; text-transform: uppercase;">Шаг 1: Вставьте код подключения друга</label>
                <textarea id="clientOfferInput" placeholder="Вставьте код хоста сюда..."></textarea>
                <button id="btnGenerateAnswer" class="p2p-btn">Создать ответный код</button>

                <div id="clientAnswerArea" style="display: none; flex-direction: column; gap: 12px; margin-top: 8px;">
                    <label style="font-size: 12px; font-weight: 600; color: #94a3b8; text-transform: uppercase;">Шаг 2: Скопируйте ответ и отправьте другу</label>
                    <textarea id="clientAnswerCode" readonly></textarea>
                    <button id="btnCopyAnswer" class="p2p-btn p2p-btn-secondary" style="padding: 8px;">Скопировать ответный код</button>
                    <p style="font-size: 11px; color: #38bdf8; text-align: center; margin: 4px 0 0 0;">После того как хост вставит ваш ответ, чат откроется сам!</p>
                </div>
            </div>

            <button id="btnBackToChoice" class="p2p-btn p2p-btn-secondary" style="display: none; margin-top: 16px;">Назад</button>
        </div>

        <!-- ЭКРАН 2: ЧАТ СЕНСОР (ОТКРЫВАЕТСЯ ПРИ ПОДКЛЮЧЕНИИ) -->
        <div id="chatScreen" style="display: none; flex-direction: column; height: 100%; width: 100%;">
            <!-- ШАПКА МЕССЕНДЖЕРА -->
            <header style="background-color: #1e293b; border-bottom: 1px solid #334155; padding: 12px 16px; display: flex; align-items: center; justify-content: space-between; z-index: 10;">
                <div style="display: flex; align-items: center; gap: 12px;">
                    <div>
                        <h1 class="font-bold text-lg text-white" style="margin: 0; font-size: 1.125rem; font-weight: 700;">🔗 Прямой P2P Канал</h1>
                        <p style="margin: 0; font-size: 0.75rem; display: flex; align-items: center; gap: 4px; color: #10b981;">
                            <span style="width: 8px; height: 8px; border-radius: 50%; display: inline-block; background-color: #10b981;"></span>
                            <span>Соединение установлено</span>
                        </p>
                    </div>
                </div>
                <button id="disconnectBtn" class="header-btn" title="Отключиться" style="color: #ef4444;">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><line x1="9" y1="9" x2="15" y2="15"></line><line x1="15" y1="9" x2="9" y2="15"></line></svg>
                </button>
            </header>

            <!-- ЗОНА СООБЩЕНИЙ -->
            <main class="flex-1 overflow-y-auto px-4 py-4 space-y-4 no-scrollbar" id="chatArea" style="padding: 16px; flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 16px;">
                <!-- Сообщения рендерятся здесь -->
            </main>

            <!-- КНОПКА ОТПРАВКИ И ПОЛЕ ВВОДА -->
            <footer style="background-color: #1e293b; border-top: 1px solid #334155; padding: 12px;">
                <div style="display: flex; gap: 8px; align-items: center;">
                    <input 
                        type="text" 
                        id="messageInput" 
                        inputmode="text"
                        autocomplete="off" 
                        autocorrect="off" 
                        placeholder="Написать сообщение..." 
                        style="flex: 1; background-color: #020617; border: 1px solid #334155; border-radius: 12px; color: #ffffff; padding: 12px; font-size: 14px; outline: none;"
                    >
                    <button type="button" id="sendBtn" style="background-color: #2563eb; color: #ffffff; border: none; padding: 12px; border-radius: 12px; cursor: pointer; display: flex; align-items: center; justify-content: center; width: 44px; height: 44px;">
                        <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
                    </button>
                </div>
            </footer>
        </div>

    </div>

    <!-- Уведомления -->
    <div id="toast" style="position: fixed; bottom: 80px; left: 50%; transform: translate(-50%, 8px); background-color: #1e293b; border: 1px solid #334155; color: #cbd5e1; padding: 8px 16px; border-radius: 12px; font-size: 14px; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.3); transition: transform 0.3s, opacity 0.3s; opacity: 0; pointer-events: none; display: flex; align-items: center; gap: 8px; z-index: 100;">
        <span id="toastText">Готово!</span>
    </div>

    <script>
        // Имя пользователя
        const username = localStorage.getItem('chat_username') || 'Пользователь_' + Math.floor(Math.random() * 100);

        // UI Элементы
        const setupScreen = document.getElementById('setupScreen');
        const chatScreen = document.getElementById('chatScreen');
        const initialChoice = document.getElementById('initialChoice');
        const hostSteps = document.getElementById('hostSteps');
        const clientSteps = document.getElementById('clientSteps');
        const btnInitHost = document.getElementById('btnInitHost');
        const btnInitClient = document.getElementById('btnInitClient');
        const btnBackToChoice = document.getElementById('btnBackToChoice');
        
        const hostOfferCode = document.getElementById('hostOfferCode');
        const hostAnswerInput = document.getElementById('hostAnswerInput');
        const btnConnectHost = document.getElementById('btnConnectHost');
        const btnCopyOffer = document.getElementById('btnCopyOffer');

        const clientOfferInput = document.getElementById('clientOfferInput');
        const btnGenerateAnswer = document.getElementById('btnGenerateAnswer');
        const clientAnswerArea = document.getElementById('clientAnswerArea');
        const clientAnswerCode = document.getElementById('clientAnswerCode');
        const btnCopyAnswer = document.getElementById('btnCopyAnswer');

        const chatArea = document.getElementById('chatArea');
        const messageInput = document.getElementById('messageInput');
        const sendBtn = document.getElementById('sendBtn');
        const disconnectBtn = document.getElementById('disconnectBtn');

        let peerConnection;
        let dataChannel;

        // Конфигурация WebRTC (используем стандартные STUN сервера)
        const rtcConfig = {
            iceServers: [
                { urls: 'stun:stun.l.google.com:19302' },
                { urls: 'stun:stun1.l.google.com:19302' }
            ]
        };

        // Хелпер упаковки SDP в короткую строку Base64
        function encodeSdp(sdpObj) {
            return btoa(JSON.stringify(sdpObj));
        }

        // Декодирование SDP из Base64
        function decodeSdp(base64Str) {
            try {
                return JSON.parse(atob(base64Str.trim()));
            } catch(e) {
                showToast("Ошибка: Неверный формат кода!");
                return null;
            }
        }

        function showToast(text) {
            const toast = document.getElementById('toast');
            document.getElementById('toastText').innerText = text;
            toast.style.opacity = '1';
            toast.style.transform = 'translate(-50%, 0px)';
            setTimeout(() => {
                toast.style.opacity = '0';
                toast.style.transform = 'translate(-50%, 8px)';
            }, 2500);
        }

        function getAvatarHtml(name) {
            let hash = 0;
            for (let i = 0; i < name.length; i++) {
                hash = name.charCodeAt(i) + ((hash << 5) - hash);
            }
            const colors = ['#2563eb', '#059669', '#d97706', '#dc2626', '#7c3aed', '#db2777', '#0d9488'];
            const color = colors[Math.abs(hash) % colors.length];
            return `<div style="width: 36px; height: 36px; border-radius: 12px; display: flex; align-items: center; justify-content: center; color: white; font-weight: bold; font-size: 14px; background-color: ${color}; flex-shrink: 0;">${name.charAt(0).toUpperCase()}</div>`;
        }

        function appendMessage(sender, text, isMe) {
            const wrapper = document.createElement('div');
            wrapper.className = 'animate-message';
            wrapper.style.display = 'flex';
            wrapper.style.gap = '12px';
            wrapper.style.maxWidth = '85%';
            
            if (isMe) {
                wrapper.style.alignSelf = 'flex-end';
                wrapper.style.flexDirection = 'row-reverse';
            } else {
                wrapper.style.alignSelf = 'flex-start';
                wrapper.style.flexDirection = 'row';
            }

            const now = new Date();
            const timeStr = now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });

            wrapper.innerHTML = `
                ${getAvatarHtml(sender)}
                <div style="display: flex; flex-direction: column; align-items: ${isMe ? 'flex-end' : 'flex-start'};">
                    <div style="display: flex; align-items: center; gap: 8px; margin-bottom: 4px;">
                        <span style="font-size: 12px; font-weight: 600; color: #94a3b8;">${sender}</span>
                        <span style="font-size: 10px; color: #475569;">${timeStr}</span>
                    </div>
                    <div style="
                        background-color: ${isMe ? '#2563eb' : '#1e293b'};
                        color: ${isMe ? '#ffffff' : '#e2e8f0'};
                        border-radius: 12px;
                        border-bottom-${isMe ? 'right' : 'left'}-radius: 0px;
                        padding: 10px 14px;
                        font-size: 14px;
                        text-align: left;
                        word-break: break-word;
                        line-height: 1.5;
                        white-space: pre-wrap;
                    ">
                        ${text.replace(/[&<>'"]/g, t => ({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[t] || t))}
                    </div>
                </div>
            `;
            chatArea.appendChild(wrapper);
            chatArea.scrollTop = chatArea.scrollHeight;
        }

        // Копирование в буфер (улучшенное для iFrame)
        function copyToClipboard(text) {
            const dummy = document.createElement("textarea");
            document.body.appendChild(dummy);
            dummy.value = text;
            dummy.select();
            document.execCommand("copy");
            document.body.removeChild(dummy);
            showToast("Код успешно скопирован в буфер!");
        }

        // Переключение меню
        btnInitHost.addEventListener('click', () => {
            initialChoice.style.display = 'none';
            hostSteps.style.display = 'flex';
            btnBackToChoice.style.display = 'block';
            initHost();
        });

        btnInitClient.addEventListener('click', () => {
            initialChoice.style.display = 'none';
            clientSteps.style.display = 'flex';
            btnBackToChoice.style.display = 'block';
        });

        btnBackToChoice.addEventListener('click', () => {
            initialChoice.style.display = 'flex';
            hostSteps.style.display = 'none';
            clientSteps.style.display = 'none';
            btnBackToChoice.style.display = 'none';
            if(peerConnection) peerConnection.close();
        });

        // ЛОГИКА ХОСТА
        function initHost() {
            peerConnection = new RTCPeerConnection(rtcConfig);
            
            // Канал отправки данных
            dataChannel = peerConnection.createDataChannel("chat");
            setupDataChannel(dataChannel);

            peerConnection.onicecandidate = e => {
                if (!e.candidate) {
                    // Все локальные сетевые кандидаты собраны, пакуем окончательный SDP
                    hostOfferCode.value = encodeSdp(peerConnection.localDescription);
                }
            };

            peerConnection.createOffer()
                .then(offer => peerConnection.setLocalDescription(offer))
                .catch(() => showToast("Ошибка генерации предложения."));
        }

        btnCopyOffer.addEventListener('click', () => {
            copyToClipboard(hostOfferCode.value);
        });

        btnConnectHost.addEventListener('click', () => {
            const answerSdp = decodeSdp(hostAnswerInput.value);
            if (answerSdp) {
                const answerDesc = new RTCSessionDescription(answerSdp);
                peerConnection.setRemoteDescription(answerDesc)
                    .then(() => showToast("Соединение устанавливается..."))
                    .catch(() => showToast("Неверный код ответа!"));
            }
        });

        // ЛОГИКА КЛИЕНТА
        btnGenerateAnswer.addEventListener('click', () => {
            const offerSdp = decodeSdp(clientOfferInput.value);
            if (!offerSdp) return;

            peerConnection = new RTCPeerConnection(rtcConfig);

            peerConnection.ondatachannel = e => {
                dataChannel = e.channel;
                setupDataChannel(dataChannel);
            };

            peerConnection.onicecandidate = e => {
                if (!e.candidate) {
                    clientAnswerCode.value = encodeSdp(peerConnection.localDescription);
                    clientAnswerArea.style.display = 'flex';
                }
            };

            const offerDesc = new RTCSessionDescription(offerSdp);
            peerConnection.setRemoteDescription(offerDesc)
                .then(() => peerConnection.createAnswer())
                .then(answer => peerConnection.setLocalDescription(answer))
                .catch(() => showToast("Ошибка разбора кода хоста."));
        });

        btnCopyAnswer.addEventListener('click', () => {
            copyToClipboard(clientAnswerCode.value);
        });

        // ОБЩИЙ НАСТРОЙ КАНАЛА ДАННЫХ
        function setupDataChannel(channel) {
            channel.onopen = () => {
                setupScreen.style.display = 'none';
                chatScreen.style.display = 'flex';
                appendMessage("СИСТЕМА", "Канал связи открыт! Теперь вы общаетесь напрямую.🔒", false);
            };

            channel.onmessage = e => {
                const data = JSON.parse(e.data);
                appendMessage(data.sender, data.text, false);
            };

            channel.onclose = () => {
                showToast("Соединение закрыто.");
                setTimeout(() => location.reload(), 1500);
            };
        }

        // ОТПРАВКА СООБЩЕНИЙ
        function sendMessage() {
            const text = messageInput.value.trim();
            if (!text || !dataChannel || dataChannel.readyState !== 'open') return;

            const packet = {
                sender: username,
                text: text
            };

            dataChannel.send(JSON.stringify(packet));
            appendMessage(username, text, true);
            messageInput.value = '';
        }

        sendBtn.addEventListener('click', sendMessage);
        messageInput.addEventListener('keydown', e => {
            if (e.key === 'Enter') sendMessage();
        });

        disconnectBtn.addEventListener('click', () => {
            if (peerConnection) peerConnection.close();
            location.reload();
        });
    </script>
</body>
</html>
